version: "3.9"

# Redis cluster: 3 primary + 3 replica nodes for local development.
# Ports 7000-7005 are exposed on the host.
#
# After starting, initialise the cluster once with:
#   docker exec -it redis-node-1 redis-cli --cluster create \
#     127.0.0.1:7000 127.0.0.1:7001 127.0.0.1:7002 \
#     127.0.0.1:7003 127.0.0.1:7004 127.0.0.1:7005 \
#     --cluster-replicas 1 --cluster-yes

x-redis-common: &redis-common
  image: redis:7.2-alpine
  restart: unless-stopped
  healthcheck:
    test: ["CMD", "redis-cli", "-p", "7000", "ping"]
    interval: 5s
    timeout: 3s
    retries: 5

services:
  redis-node-1:
    <<: *redis-common
    container_name: redis-node-1
    ports:
      - "7000:7000"
    command: >
      redis-server
      --port 7000
      --cluster-enabled yes
      --cluster-config-file nodes.conf
      --cluster-node-timeout 5000
      --appendonly yes
      --bind 0.0.0.0
      --protected-mode no
    volumes:
      - redis-node-1-data:/data

  redis-node-2:
    <<: *redis-common
    container_name: redis-node-2
    ports:
      - "7001:7001"
    command: >
      redis-server
      --port 7001
      --cluster-enabled yes
      --cluster-config-file nodes.conf
      --cluster-node-timeout 5000
      --appendonly yes
      --bind 0.0.0.0
      --protected-mode no
    volumes:
      - redis-node-2-data:/data

  redis-node-3:
    <<: *redis-common
    container_name: redis-node-3
    ports:
      - "7002:7002"
    command: >
      redis-server
      --port 7002
      --cluster-enabled yes
      --cluster-config-file nodes.conf
      --cluster-node-timeout 5000
      --appendonly yes
      --bind 0.0.0.0
      --protected-mode no
    volumes:
      - redis-node-3-data:/data

  redis-node-4:
    <<: *redis-common
    container_name: redis-node-4
    ports:
      - "7003:7003"
    command: >
      redis-server
      --port 7003
      --cluster-enabled yes
      --cluster-config-file nodes.conf
      --cluster-node-timeout 5000
      --appendonly yes
      --bind 0.0.0.0
      --protected-mode no
    volumes:
      - redis-node-4-data:/data

  redis-node-5:
    <<: *redis-common
    container_name: redis-node-5
    ports:
      - "7004:7004"
    command: >
      redis-server
      --port 7004
      --cluster-enabled yes
      --cluster-config-file nodes.conf
      --cluster-node-timeout 5000
      --appendonly yes
      --bind 0.0.0.0
      --protected-mode no
    volumes:
      - redis-node-5-data:/data

  redis-node-6:
    <<: *redis-common
    container_name: redis-node-6
    ports:
      - "7005:7005"
    command: >
      redis-server
      --port 7005
      --cluster-enabled yes
      --cluster-config-file nodes.conf
      --cluster-node-timeout 5000
      --appendonly yes
      --bind 0.0.0.0
      --protected-mode no
    volumes:
      - redis-node-6-data:/data

volumes:
  redis-node-1-data:
  redis-node-2-data:
  redis-node-3-data:
  redis-node-4-data:
  redis-node-5-data:
  redis-node-6-data:
