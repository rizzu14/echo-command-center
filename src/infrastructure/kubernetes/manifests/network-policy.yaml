apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: deny-all-cross-namespace
  namespace: "{{TENANT_NAMESPACE}}"
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow intra-namespace traffic only
    - from:
        - podSelector: {}
    # Allow ingress from the ECHO control plane namespace
    - from:
        - namespaceSelector:
            matchLabels:
              echo.io/role: control-plane
  egress:
    # Allow intra-namespace traffic only
    - to:
        - podSelector: {}
    # Allow DNS resolution
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Allow egress to ECHO control plane (Kafka, PostgreSQL, Redis)
    - to:
        - namespaceSelector:
            matchLabels:
              echo.io/role: control-plane
