apiVersion: apps/v1
kind: Deployment
metadata:
  name: "{{AGENT_NAME}}"
  namespace: "{{TENANT_NAMESPACE}}"
  labels:
    app: "{{AGENT_NAME}}"
    echo.io/tenant: "{{TENANT_ID}}"
    echo.io/agent-type: "{{AGENT_TYPE}}"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: "{{AGENT_NAME}}"
  template:
    metadata:
      labels:
        app: "{{AGENT_NAME}}"
        echo.io/tenant: "{{TENANT_ID}}"
        echo.io/agent-type: "{{AGENT_TYPE}}"
    spec:
      serviceAccountName: "echo-agent-sa"
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 2000
      containers:
        - name: "{{AGENT_NAME}}"
          image: "{{AGENT_IMAGE}}"
          imagePullPolicy: IfNotPresent
          env:
            - name: TENANT_ID
              value: "{{TENANT_ID}}"
            - name: AGENT_TYPE
              value: "{{AGENT_TYPE}}"
            - name: KAFKA_BROKERS
              valueFrom:
                secretKeyRef:
                  name: echo-kafka-credentials
                  key: brokers
            - name: POSTGRES_URL
              valueFrom:
                secretKeyRef:
                  name: echo-postgres-credentials
                  key: url
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: echo-redis-credentials
                  key: url
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
